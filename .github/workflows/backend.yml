name: Backend CI

on:
  push:
    branches: [master, main]
    paths: ['backend/**']
  pull_request:
    branches: [master, main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mantlemandate
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: mantlemandate_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://mantlemandate:devpassword@localhost:5432/mantlemandate_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
        run: pytest tests/ -v --cov=app --cov-report=term-missing
