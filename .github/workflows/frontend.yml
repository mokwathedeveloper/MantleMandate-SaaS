name: Frontend CI

on:
  push:
    branches: [master, main]
    paths: ['frontend/**']
  pull_request:
    branches: [master, main]
    paths: ['frontend/**']

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_MANTLE_CHAIN_ID: '5000'
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
          NEXT_PUBLIC_MANTLE_RPC_URL: https://rpc.mantle.xyz
          NEXT_PUBLIC_MANTLE_TESTNET_RPC_URL: https://rpc.sepolia.mantle.xyz
          NEXT_PUBLIC_MANDATE_POLICY_CONTRACT: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_AGENT_EXECUTOR_CONTRACT: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_RISK_GUARD_CONTRACT: '0x0000000000000000000000000000000000000000'
